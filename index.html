<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- SEO Meta Tags -->
    <title>Wealth Holding | Premium Real Estate in Egypt</title>
    <meta
      name="title"
      content="Wealth Holding | Premium Real Estate in Egypt"
    />
    <meta
      name="description"
      content="Wealth Holding delivers premium real estate developments in Egypt, combining design excellence, strategic locations, and long-term investment value."
    />
    <meta name="robots" content="index,follow" />
    <meta
      name="keywords"
      content="real estate, property development, investment, real estate solutions"
    />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://wealthholding-eg.com" />

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://wealthholding-eg.com" />
    <meta
      property="og:title"
      content="Wealth Holding | Premium Real Estate in Egypt"
    />
    <meta
      property="og:description"
      content="Wealth Holding delivers premium real estate developments in Egypt, combining design excellence, strategic locations, and long-term investment value."
    />

    <meta property="og:site_name" content="Wealth Holding" />

    <!-- Twitter Card -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://wealthholding-eg.com" />
    <meta
      property="twitter:title"
      content="Wealth Holding | Premium Real Estate in Egypt"
    />
    <meta
      property="twitter:description"
      content="Wealth Holding delivers premium real estate developments in Egypt, combining design excellence, strategic locations, and long-term investment value."
    />

    <!-- Structured Data (Schema.org JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": ["Organization", "Corporation"],
        "name": "Wealth Holding",
        "url": "https://wealthholding-eg.com",
        "description": "Wealth Holding is a leading real estate developer delivering integrated property solutions.",
        "sameAs": [
          "https://www.facebook.com/WealthHolding/",
          "https://www.instagram.com/wealthholding",
          "https://eg.linkedin.com/company/wealth-holding-developments",
          "https://www.youtube.com/@WealthHolding"
        ],
        "contactPoint": {
          "@type": "ContactPoint",
          "telephone": "19640",
          "email": "info@wealthholding-eg.com",
          "contactType": "customer service",
          "areaServed": ["EG", "BH", "KW", "IQ", "OM", "QA", "SA", "AE"],
          "availableLanguage": ["en", "ar"]
        },
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Ground Floor, 235 Office Building - Section 2, N Teseen",
          "addressLocality": "New Cairo 1",
          "addressRegion": "Cairo Governorate",
          "postalCode": "4730420",
          "addressCountry": "EG"
        },
        "areaServed": [
          { "@type": "Country", "name": "Egypt" },
          { "@type": "Country", "name": "Bahrain" },
          { "@type": "Country", "name": "Kuwait" },
          { "@type": "Country", "name": "Iraq" },
          { "@type": "Country", "name": "Oman" },
          { "@type": "Country", "name": "Qatar" },
          { "@type": "Country", "name": "Saudi Arabia" },
          { "@type": "Country", "name": "United Arab Emirates" }
        ],
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://wealthholding-eg.com/projects?q={search_term_string}"
          },
          "query": "required name=search_term_string"
        }
      }
    </script>

    <!-- Favicon & App Icons -->
    <link rel="icon" type="image/png" href="/emblem.png" />
    <link rel="shortcut icon" href="/emblem.png" />
    <link rel="apple-touch-icon" href="/emblem.png" />

    <!-- Performance: Preconnect & Preload -->

    />

      href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css"

    />

  </head>
