version: '3.9'

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: wealth-holding-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: wealth_holding
      MYSQL_USER: wealth_user
      MYSQL_PASSWORD: wealth_password
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      timeout: 20s
      retries: 10
    networks:
      - wealth-network

  # Backend API
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: wealth-holding-backend
    restart: unless-stopped
    env_file:
      - ./server/.env.docker
    ports:
      - '3001:3001'
    environment:
      - PORT=3001
      - NODE_ENV=development
      - CORS_ORIGIN=http://localhost:5173
      - DATABASE_URL=mysql://wealth_user:wealth_password@db:3306/wealth_holding
      - JWT_SECRET=docker-development-secret-change-in-production
      - ADMIN_EMAIL=admin@wealthholding.com
      - ADMIN_PASSWORD=changeme123
    depends_on:
      db:
        condition: service_healthy
    networks:
      - wealth-network
    volumes:
      - ./server/src:/app/src
      - backend_uploads:/app/uploads
    command: sh -c "sleep 10 && npm run start"

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: wealth-holding-frontend
    restart: unless-stopped
    ports:
      - '5173:5173'
    environment:
      - VITE_API_URL=http://localhost:3001
    depends_on:
      - backend
    networks:
      - wealth-network
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  mysql_data:
    driver: local
  backend_uploads:
    driver: local

networks:
  wealth-network:
    driver: bridge
